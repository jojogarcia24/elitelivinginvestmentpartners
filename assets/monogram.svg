<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Elite Living Investment Partners monogram">
  <!--
    ELIP monogram — font-independent high-contrast serif "E".
    Uses currentColor so it inherits ink (on light) or cream (on dark).
  -->
  <g fill="currentColor">
    <rect x="35" y="28" width="6" height="44"/>
    <rect x="35" y="28" width="30" height="6"/>
    <rect x="35" y="47" width="22" height="5"/>
    <rect x="35" y="66" width="30" height="6"/>
    <rect x="33" y="28" width="10" height="2.4"/>
    <rect x="33" y="69.6" width="10" height="2.4"/>
  </g>
</svg>
